name: 'Build Android APK'

on:
  workflow_dispatch:
    inputs:
      draft:
        description: '创建为草稿 release'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    name: Build Android APK/AAB
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Start job timer
        shell: bash
        run: echo "JOB_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: 导出 Android NDK 环境变量
        shell: bash
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          # 自动定位 NDK 目录并导出
          NDK_DIR=$(ls -d ${ANDROID_HOME}/ndk/*/ 2>/dev/null | head -1)
          if [ -n "$NDK_DIR" ]; then
            NDK_DIR="${NDK_DIR%/}"
            echo "ANDROID_NDK_HOME=${NDK_DIR}" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_ROOT=${NDK_DIR}" >> "$GITHUB_ENV"
            echo "NDK_HOME=${NDK_DIR}" >> "$GITHUB_ENV"
            echo "NDK 路径: ${NDK_DIR}"
          else
            echo "::error::未找到 NDK 安装目录"
            exit 1
          fi

      - name: 安装前端依赖
        run: npm ci

      - name: 检查版本一致性
        run: npm run version:check

      - name: 初始化 Tauri Android 项目
        shell: bash
        env:
          VITE_VARIANT: full
          VITE_DESKTOP_RUNTIME: '1'
        run: |
          # 初始化 Android 项目（已存在则跳过）
          npx tauri android init --config src-tauri/tauri.android.conf.json || echo "Android 项目已存在或初始化跳过"

      - name: 构建 Android APK + AAB
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_VARIANT: full
          VITE_DESKTOP_RUNTIME: '1'
          VITE_WS_API_URL: https://worldmonitor.app
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          echo "=== 开始构建 Android APK + AAB ==="
          npx tauri android build --apk --aab --config src-tauri/tauri.android.conf.json

      - name: 定位构建产物
        id: locate
        shell: bash
        run: |
          echo "=== 查找 APK / AAB 产物 ==="
          APK_FILE=$(find src-tauri/gen/android -name "*.apk" -type f 2>/dev/null | head -1)
          AAB_FILE=$(find src-tauri/gen/android -name "*.aab" -type f 2>/dev/null | head -1)
          echo "APK: ${APK_FILE:-未找到}"
          echo "AAB: ${AAB_FILE:-未找到}"
          if [ -z "$APK_FILE" ]; then
            echo "::error::未找到 APK 产物"
            exit 1
          fi
          echo "apk_path=${APK_FILE}" >> "$GITHUB_OUTPUT"
          echo "aab_path=${AAB_FILE}" >> "$GITHUB_OUTPUT"

      - name: 签名 APK
        id: sign
        shell: bash
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          # GitHub Secrets：用户本地生成的 keystore（base64 编码）
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Tauri Android 默认输出 unsigned APK，需手动签名才能安装
          # 优先使用 GitHub Secrets 中的 keystore；未配置时回退到临时自签名
          set -e
          UNSIGNED_APK="${{ steps.locate.outputs.apk_path }}"
          AAB_FILE="${{ steps.locate.outputs.aab_path }}"
          KEYSTORE="$HOME/release.keystore"

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "=== 使用 GitHub Secrets 中的 keystore ==="
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
            STORE_PASS="$ANDROID_KEYSTORE_PASSWORD"
            ALIAS="$ANDROID_KEY_ALIAS"
            KEY_PASS="$ANDROID_KEY_PASSWORD"
            if [ -z "$STORE_PASS" ] || [ -z "$ALIAS" ] || [ -z "$KEY_PASS" ]; then
              echo "::error::已配置 ANDROID_KEYSTORE_BASE64，但 ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD 缺失"
              exit 1
            fi
            echo "keystore 已从 Secrets 解码，alias=$ALIAS"
          else
            echo "=== 未配置 Secrets，生成临时自签名 keystore ==="
            STORE_PASS="worldmonitor2026"
            ALIAS="wm-release"
            KEY_PASS="worldmonitor2026"
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -dname "CN=WorldMonitor, OU=Dev, O=WorldMonitor, L=Beijing, ST=Beijing, C=CN"
            echo "::warning::使用临时自签名 keystore，每次构建签名不同，无法升级覆盖安装。建议配置 GitHub Secrets。"
          fi

          # 定位 build-tools 中的 apksigner 和 zipalign
          BUILD_TOOLS_DIR=$(ls -d ${ANDROID_HOME}/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::未找到 Android build-tools"
            exit 1
          fi
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
          ZIPALIGN="${BUILD_TOOLS_DIR}zipalign"
          echo "apksigner: $APKSIGNER"
          echo "zipalign: $ZIPALIGN"

          echo "=== zipalign 对齐 APK ==="
          ALIGNED_APK="${UNSIGNED_APK%.apk}-aligned.apk"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          echo "=== apksigner 签名 APK ==="
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          echo "=== 验证签名 ==="
          "$APKSIGNER" verify --verbose "$SIGNED_APK" | head -10

          echo "=== 签名 AAB（如存在）==="
          if [ -n "$AAB_FILE" ] && [ -f "$AAB_FILE" ]; then
            SIGNED_AAB="${AAB_FILE%.aab}-signed.aab"
            jarsigner -keystore "$KEYSTORE" -storepass "$STORE_PASS" \
              -signedjar "$SIGNED_AAB" "$AAB_FILE" "$ALIAS"
            echo "AAB 已签名: $SIGNED_AAB"
          fi

          # 用签名后的 APK 替换 unsigned 版本
          cp "$SIGNED_APK" "$UNSIGNED_APK"
          rm -f "$ALIGNED_APK" "$SIGNED_APK"
          echo "apk_signed=true" >> "$GITHUB_OUTPUT"
          echo "=== 签名完成 ==="

      - name: 用版本号重命名产物
        id: rename
        shell: bash
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          cp "${{ steps.locate.outputs.apk_path }}" "world-monitor-v${VERSION}-android.apk"
          if [ -n "${{ steps.locate.outputs.aab_path }}" ]; then
            cp "${{ steps.locate.outputs.aab_path }}" "world-monitor-v${VERSION}-android.aab"
          fi
          ls -lh world-monitor-v${VERSION}-android.*
          echo "=== 验证最终 APK 签名 ==="
          BUILD_TOOLS_DIR=$(ls -d ${ANDROID_HOME}/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          "${BUILD_TOOLS_DIR}apksigner" verify --verbose "world-monitor-v${VERSION}-android.apk" | head -5

      - name: 创建 Release 并上传 APK/AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-android
          name: '世界监控 ${{ github.ref_name }} (Android)'
          body: '请查看下方更新日志。'
          draft: ${{ github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.draft) }}
          prerelease: false
          files: |
            world-monitor-v*-android.apk
            world-monitor-v*-android.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物（artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}
          path: |
            world-monitor-v*-android.apk
            world-monitor-v*-android.aab
          if-no-files-found: warn

      - name: 报告构建耗时
        if: always()
        shell: bash
        run: |
          if [ -z "${JOB_START_EPOCH:-}" ]; then
            echo "::warning::JOB_START_EPOCH 缺失"
            exit 0
          fi
          END_EPOCH=$(date +%s)
          ELAPSED=$((END_EPOCH - JOB_START_EPOCH))
          echo "Android 构建耗时: $((ELAPSED / 60))m $((ELAPSED % 60))s"

  # ── 自动生成中文 release notes ──
  update-release-notes:
    needs: build-android
    if: always() && contains(needs.build-android.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成并更新中文 release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          TAG="v${VERSION}-android"
          PREV_TAG=$(git tag --list 'v*-android' --sort=-version:refname | grep -v "^${TAG}$" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS="首次发布"
          else
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --oneline --no-merges \
              | sed 's/^[a-f0-9]*//' \
              | sed 's/^ /- /')
          fi

          BODY=$(cat <<NOTES
          ## 📦 世界监控 Android v${VERSION}

          ### 📝 更新内容

          ${COMMITS}

          ### 📥 安装说明

          - 下载下方 \`world-monitor-v${VERSION}-android.apk\` 文件
          - 在 Android 设备上开启「允许安装未知来源应用」
          - 点击 APK 文件进行安装
          - 首次启动后请在「设置 - AI 与摘要」中填入中国大模型 API Key

          ### ✨ 主要特性

          - 🇨🇳 全中文界面与视角
          - 📈 中国 A 股市场实时行情（含上证、深证、创业板、科创板）
          - 💰 贵金属人民币计价（黄金、白银、铂金）
          - 🤖 中国主流 AI 大模型摘要（DeepSeek、通义千问、智谱 GLM、Kimi、百川）
          - 🌐 外文新闻自动翻译为中文
          - 📱 Android 原生体验

          **完整对比**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...${TAG}
          NOTES
          )

          gh release edit "$TAG" --notes "$BODY" || \
            gh release create "$TAG" --notes "$BODY" --title "世界监控 v${VERSION} (Android)"
          echo "已更新 release notes: $TAG"
