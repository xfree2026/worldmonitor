name: '同步上游仓库'

# 每天北京时间 04:00（UTC 20:00）自动同步上游 koala73/worldmonitor
# 也可手动触发
on:
  schedule:
    - cron: '0 20 * * *'  # UTC 20:00 = 北京时间 04:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出 fork 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git 身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游远程并拉取
        run: |
          git remote add upstream https://github.com/koala73/worldmonitor.git
          git fetch upstream main

      - name: 检查上游是否有新提交
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$UPSTREAM" ] || git merge-base --is-ancestor upstream/main HEAD; then
            # 检查是否有 fork 自定义提交未在上游
            BEHIND=$(git rev-list --count HEAD..upstream/main)
            echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
            if [ "$BEHIND" = "0" ]; then
              echo "has_updates=false" >> "$GITHUB_OUTPUT"
              echo "上游无新提交，无需同步"
            else
              echo "has_updates=true" >> "$GITHUB_OUTPUT"
              echo "上游领先 $BEHIND 个提交，需要同步"
            fi
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "需要同步上游"
          fi

      - name: 合并上游（保留 fork 自定义改动）
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "正在合并上游 upstream/main ..."
          git merge upstream/main --no-edit
          if [ $? -ne 0 ]; then
            echo "::error::合并冲突，需手动处理"
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: 保持版本号与上游一致
        if: steps.check.outputs.has_updates == 'true'
        run: |
          # 获取上游 package.json 版本号，强制同步到 fork
          UPSTREAM_VERSION=$(git show upstream/main:package.json | jq -r '.version')
          LOCAL_VERSION=$(jq -r '.version' package.json)
          echo "上游版本: $UPSTREAM_VERSION, 本地版本: $LOCAL_VERSION"
          if [ "$UPSTREAM_VERSION" != "$LOCAL_VERSION" ]; then
            echo "版本号不一致，同步为上游版本 $UPSTREAM_VERSION"
            # 更新 package.json
            jq --arg v "$UPSTREAM_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
            # 同步到 tauri.conf.json 和 Cargo.toml
            npm run version:sync
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit --amend --no-edit
          else
            echo "版本号已与上游一致"
          fi

      - name: 推送到 fork main
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git push origin main
          echo "✅ 已同步上游并推送到 fork main"

      - name: 汇总
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" = "true" ]; then
            echo "✅ 同步完成"
          else
            echo "ℹ️ 无需同步，fork 已与上游一致"
          fi
