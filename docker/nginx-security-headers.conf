# Security headers — keep in sync with vercel.json "headers" (source of truth).
# Include in every location so add_header in location blocks does not replace server-level headers.
add_header X-Content-Type-Options "nosniff" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Relative report URL so every host (apex + tech/finance/commodity/happy
# subdomains, all served by the same deployment) reports same-origin —
# absolute apex URLs force cross-origin POSTs with stripped credentials
# and inconsistent browser sampling per host.
add_header Reporting-Endpoints "wm-coop-coep=\"/api/security/report\"" always;
add_header Cross-Origin-Opener-Policy-Report-Only "same-origin; report-to=\"wm-coop-coep\"" always;
add_header Cross-Origin-Embedder-Policy-Report-Only "require-corp; report-to=\"wm-coop-coep\"" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), accelerometer=(), autoplay=(self \"https://www.youtube.com\" \"https://www.youtube-nocookie.com\"), bluetooth=(), display-capture=(), encrypted-media=(self \"https://www.youtube.com\" \"https://www.youtube-nocookie.com\"), gyroscope=(), hid=(), idle-detection=(), magnetometer=(), midi=(), payment=(self \"https://checkout.dodopayments.com\" \"https://test.checkout.dodopayments.com\" \"https://pay.google.com\" \"https://hooks.stripe.com\" \"https://js.stripe.com\"), picture-in-picture=(self \"https://www.youtube.com\" \"https://www.youtube-nocookie.com\" \"https://challenges.cloudflare.com\"), unload=(*), screen-wake-lock=(), serial=(), usb=(), xr-spatial-tracking=(\"https://challenges.cloudflare.com\")" always;
